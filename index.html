<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Amalgamation Network</title>
  <link rel="stylesheet" href="styles.css?v=3">
</head>
<body>
  <div id="app">
    <!-- Header -->
    <header id="header">
      <div class="header-left">
        <h1 class="logo">AMALGAMATION<span class="logo-accent">_NET</span></h1>
        <span class="subtitle">Creative Network Visualization</span>
      </div>
      <div class="header-right">
        <button id="projects-toggle">Projects</button>
        <div class="stats">
          <span id="node-count">0</span> people · <span id="active-tags">all</span>
        </div>
      </div>
    </header>

    <!-- Search / Filter Bar -->
    <div id="controls">
      <div class="search-wrap">
        <svg class="search-icon" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input type="text" id="search" placeholder="Search people, tags, studios..." autocomplete="off" />
        <kbd class="shortcut">/</kbd>
      </div>
      <div id="tag-filters"></div>
    </div>

    <!-- Info Panel -->
    <div id="info-panel" class="hidden">
      <button id="panel-close">&times;</button>
      <div id="panel-content"></div>
    </div>

    <!-- Projects Panel -->
    <div id="projects-panel" class="hidden">
      <button id="projects-close">&times;</button>
      <div class="projects-panel-title">Projects</div>
      <div id="projects-list"></div>
    </div>

    <!-- Canvas -->
    <div id="graph-container">
      <canvas id="graph-canvas"></canvas>
    </div>
  </div>

  <script src="https://d3js.org/d3.v7.min.js"></script>
  <script src="network-data.js"></script>
  <script src="app.js"></script>
</body>
</html>
